<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0ABAB5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jeffrey's Language Learning App</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#F2F9F9;--bg-1:#E0F0F0;--bg-2:#FFFFFF;--bg-3:#CBE8E8;
  --accent:#0ABAB5;--accent-light:#B2E8E6;--accent-glow:rgba(10,186,181,0.10);
  --accent2:#C4A35A;--accent2-light:#FFF3DC;
  --pop1:#F2A65A;--pop2:#0ABAB5;--pop3:#E8637A;
  --text-0:#1A3C3C;--text-1:#4D7A7A;--text-2:#8EB5B5;
  --success:#2ECC71;--success-bg:#E8FAEF;--error:#E8637A;--error-bg:#FDECEF;
  --warning:#F2A65A;--warning-bg:#FFF3E0;
  --border:#B8D8D8;--border-light:#D6ECEC;
  --card-shadow:0 2px 8px rgba(10,186,181,0.06),0 1px 3px rgba(0,0,0,0.04);
  --elevated-shadow:0 8px 24px rgba(10,186,181,0.10),0 2px 8px rgba(0,0,0,0.04);
  --radius:16px;--radius-sm:12px;--radius-lg:22px;
  --font-head:'Nunito','Noto Sans JP',sans-serif;
  --font-body:'Quicksand','Noto Sans JP',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --nav-h:68px;--header-h:52px;--langbar-h:44px;
}
:root.dark{
  --bg-0:#0D1F1F;--bg-1:#132B2B;--bg-2:#1A3636;--bg-3:#224545;
  --accent:#4DD9D4;--accent-light:#1A4A48;--accent-glow:rgba(77,217,212,0.12);
  --accent2:#D4B76A;--accent2-light:#3D3420;
  --pop1:#FFD180;--pop2:#64FFDA;--pop3:#FF80AB;
  --text-0:#E0F0F0;--text-1:#8EB5B5;--text-2:#4D7A7A;
  --success:#69F0AE;--success-bg:#0E2A1B;--error:#FF8A80;--error-bg:#3D1616;
  --warning:#FFD180;--warning-bg:#3D2E0A;
  --border:#2E5555;--border-light:#224545;
  --card-shadow:0 2px 8px rgba(0,0,0,0.2);
  --elevated-shadow:0 8px 24px rgba(0,0,0,0.3);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);color:var(--text-0);background:var(--bg-0);
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-head);font-weight:800;letter-spacing:-0.01em}
input,select,textarea,button{font-family:inherit;font-size:16px}
a{color:var(--accent);text-decoration:none}

/* App Shell */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;position:relative}
#header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--bg-1);flex-shrink:0;z-index:50;
}
#header .logo{font-family:var(--font-head);font-size:18px;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;
}
#header .actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
#header .actions button{
  width:34px;height:34px;border:none;border-radius:50%;background:transparent;
  color:var(--text-1);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;
}
#header .actions button:hover{background:var(--bg-3);color:var(--text-0)}
#header .actions .sync-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sync Status Indicator */
.sync-indicator{
  display:flex;align-items:center;gap:5px;padding:4px 12px;
  border-radius:20px;font-size:11px;font-weight:700;transition:all .35s ease;
  font-family:var(--font-body);white-space:nowrap;cursor:default;
}
.sync-indicator i{font-size:12px;transition:transform .2s}
.sync-indicator.saving{color:var(--accent);background:var(--accent-glow)}
.sync-indicator.saving i.fa-arrows-rotate{animation:spin 1s linear infinite}
.sync-indicator.saved{color:var(--success);background:var(--success-bg)}
.sync-indicator.error{color:var(--error);background:var(--error-bg)}
.sync-indicator .retry-btn{
  background:none;border:1.5px solid var(--error);color:var(--error);
  padding:2px 8px;border-radius:12px;font-size:10px;font-weight:800;
  cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-left:2px;
}
.sync-indicator .retry-btn:hover{background:var(--error);color:#fff}
.sync-indicator.hidden{opacity:0;pointer-events:none;width:0;padding:0;overflow:hidden}

/* Language Bar (below header) */
#langbar{
  height:var(--langbar-h);display:flex;align-items:center;gap:6px;
  padding:0 14px;background:var(--bg-1);border-bottom:2px solid var(--border-light);
  flex-shrink:0;z-index:49;overflow-x:auto;
}
.lang-pill{
  display:flex;align-items:center;gap:5px;padding:5px 14px;
  border:2px solid transparent;border-radius:22px;background:var(--bg-2);
  cursor:pointer;font-size:13px;font-weight:700;color:var(--text-1);
  transition:all .2s;font-family:var(--font-body);white-space:nowrap;flex-shrink:0;
}
.lang-pill:hover{border-color:var(--accent);transform:translateY(-1px)}
.lang-pill.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 3px 10px rgba(10,186,181,0.25);
}
.lang-pill .flag{font-size:16px;line-height:1}

#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.view{display:none;padding:16px;animation:fadeIn .3s cubic-bezier(0.16,1,0.3,1)}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Bottom Nav */
#nav{
  height:var(--nav-h);display:flex;align-items:stretch;
  background:var(--bg-1);border-top:2px solid var(--border-light);
  flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;color:var(--text-2);cursor:pointer;
  font-size:10px;font-weight:700;transition:all .2s;position:relative;
  font-family:var(--font-body);
}
.nav-item i{font-size:20px;transition:all .2s}
.nav-item.active{color:var(--accent)}
.nav-item.active i{transform:scale(1.15)}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:0 0 4px 4px;
}
.nav-item .badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  background:var(--accent2);color:#fff;font-size:9px;font-weight:800;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;padding:0 4px;animation:popIn .3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}

/* Cards */
.card{
  background:var(--bg-2);border:2px solid var(--border-light);
  border-radius:var(--radius);padding:16px;box-shadow:var(--card-shadow);
  transition:all .2s;
}
.card:hover{box-shadow:var(--elevated-shadow);transform:translateY(-1px)}
.card+.card{margin-top:10px}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border:none;border-radius:var(--radius-sm);font-weight:700;
  cursor:pointer;transition:all .2s;font-size:15px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#08D4CF);color:#fff;box-shadow:0 3px 10px rgba(10,186,181,0.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(10,186,181,0.3)}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:var(--bg-2);color:var(--text-0);border:2px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);background:var(--accent-glow)}
.btn-ghost{background:transparent;color:var(--text-1)}
.btn-ghost:hover{background:var(--bg-3);color:var(--text-0)}
.btn-danger{background:linear-gradient(135deg,var(--error),#FF4757);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-block{width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn .spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}

/* Inputs */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-0);color:var(--text-0);font-size:16px;transition:all .2s;outline:none;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-group textarea{min-height:80px;resize:vertical}
.form-group .hint{font-size:12px;color:var(--text-2);margin-top:3px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* Tags */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
  background:var(--accent-glow);color:var(--accent);
}
.tag-lang{background:var(--accent2-light);color:var(--accent2)}

/* Search */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-2);font-size:14px}
.search-wrap input{
  width:100%;padding:10px 14px 10px 40px;border:2px solid var(--border);
  border-radius:26px;background:var(--bg-2);color:var(--text-0);font-size:16px;outline:none;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* Dashboard Quick Search */
.dash-search{position:relative;margin-bottom:16px}
.dash-search input{
  width:100%;padding:12px 16px 12px 44px;border:2px solid var(--border);
  border-radius:var(--radius);background:var(--bg-2);color:var(--text-0);
  font-size:16px;outline:none;font-family:var(--font-body);font-weight:600;
  transition:all .2s;
}
.dash-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.dash-search .ds-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-2);font-size:16px;pointer-events:none;transition:color .2s}
.dash-search input:focus ~ .ds-icon,.dash-search input:not(:placeholder-shown) ~ .ds-icon{color:var(--accent)}
.dash-suggest{
  position:absolute;top:100%;left:0;right:0;z-index:60;margin-top:4px;
  background:var(--bg-2);border:2px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--elevated-shadow);max-height:260px;overflow-y:auto;display:none;
}
.dash-suggest.open{display:block;animation:fadeIn .2s ease}
.dash-suggest-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid var(--border-light);
}
.dash-suggest-item:last-child{border-bottom:none}
.dash-suggest-item:hover,.dash-suggest-item.active{background:var(--accent-glow)}
.dash-suggest-item .ds-type{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;
}
.dash-suggest-item .ds-type.vocab{background:var(--accent-glow);color:var(--accent)}
.dash-suggest-item .ds-type.grammar{background:var(--accent2-light);color:var(--accent2)}
.dash-suggest-item .ds-text{font-weight:700;font-size:14px;color:var(--text-0)}
.dash-suggest-item .ds-sub{font-size:12px;color:var(--text-2);font-weight:600}
.dash-suggest-item .ds-reading{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:600}

/* Dashboard Detail Card */
.dash-detail{
  background:var(--bg-2);border:2px solid var(--accent);border-radius:var(--radius);
  padding:18px;box-shadow:var(--elevated-shadow);margin-bottom:16px;
  animation:fadeSlide .3s cubic-bezier(0.16,1,0.3,1);position:relative;
}
.dash-detail .dd-close{
  position:absolute;top:10px;right:10px;width:28px;height:28px;border:none;
  border-radius:50%;background:var(--bg-3);color:var(--text-1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;
}
.dash-detail .dd-close:hover{background:var(--error-bg);color:var(--error)}
.dash-detail .dd-word{font-family:var(--font-head);font-size:26px;font-weight:900;color:var(--text-0);margin-bottom:2px}
.dash-detail .dd-reading{font-family:var(--font-mono);font-size:15px;color:var(--accent);margin-bottom:6px}
.dash-detail .dd-article{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;background:var(--accent-glow);color:var(--accent);margin-bottom:6px}
.dash-detail .dd-meaning{font-size:16px;color:var(--text-0);font-weight:700;margin-bottom:8px;line-height:1.5}
.dash-detail .dd-example{
  font-size:13px;color:var(--text-1);padding:8px 12px;
  background:var(--bg-0);border-radius:var(--radius-sm);border-left:3px solid var(--accent);
  margin-bottom:8px;line-height:1.5;font-weight:600;
}
.dash-detail .dd-folder{font-size:12px;color:var(--text-2);font-weight:700}
.dash-detail .dd-folder i{margin-right:4px}

/* Filter Chip Tabs */
.lang-tabs,.cat-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap}
.lang-tab,.cat-chip{
  padding:6px 14px;border:2px solid var(--border);border-radius:22px;
  background:var(--bg-2);color:var(--text-1);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--font-body);
}
.lang-tab.active,.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(10,186,181,0.2)}
.cat-chip i{margin-right:3px;font-size:10px}

/* Folder List */
.folder-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.folder-row{
  background:var(--bg-2);border:2px solid var(--border-light);border-radius:var(--radius);
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--card-shadow);transition:all .2s;position:relative;overflow:hidden;
}
.folder-row::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;
}
.folder-row:hover{border-color:var(--accent);box-shadow:var(--elevated-shadow)}
.folder-row:hover::before{opacity:1}
.folder-row .folder-icon{font-size:22px;color:var(--accent);flex-shrink:0;width:32px;text-align:center;transition:transform .2s}
.folder-row:hover .folder-icon{transform:scale(1.1)}
.folder-row .folder-info{flex:1;min-width:0;cursor:pointer}
.folder-row .folder-name{font-family:var(--font-head);font-weight:800;font-size:15px;color:var(--text-0);word-break:break-word;line-height:1.3}
.folder-row .folder-count{font-size:11px;color:var(--text-2);font-weight:700;margin-top:1px}
.folder-row .folder-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.folder-row .folder-actions button{
  width:30px;height:30px;border:none;border-radius:8px;background:transparent;
  color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .15s;
}
.folder-row .folder-actions button:hover{background:var(--bg-3);color:var(--text-0)}
.folder-row .folder-actions button:active{transform:scale(0.9)}
.folder-row .folder-actions button.move-up:hover,.folder-row .folder-actions button.move-down:hover{color:var(--accent)}
.folder-row .folder-actions button.edit-btn:hover{color:var(--accent2)}
.folder-row.add-folder{border-style:dashed;border-color:var(--border);background:transparent;cursor:pointer;justify-content:center;gap:8px;padding:14px}
.folder-row.add-folder .folder-icon{color:var(--text-2)}
.folder-row.add-folder:hover{border-color:var(--accent);background:var(--accent-glow)}
.folder-row.add-folder:hover .folder-icon{color:var(--accent)}
.folder-row.add-folder .add-label{font-size:14px;font-weight:700;color:var(--text-2)}
.folder-row.add-folder:hover .add-label{color:var(--accent)}
.folder-back{
  display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  border:none;border-radius:22px;background:var(--bg-2);border:2px solid var(--border);
  cursor:pointer;font-size:13px;font-weight:700;color:var(--text-1);
  transition:all .2s;font-family:var(--font-body);margin-bottom:12px;
}
.folder-back:hover{border-color:var(--accent);color:var(--accent)}
.folder-back i{font-size:12px}

/* Section Headers */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-head h2{font-size:20px}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--bg-2);border:2px solid var(--border-light);border-radius:var(--radius);
  padding:14px;text-align:center;box-shadow:var(--card-shadow);transition:all .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--elevated-shadow)}
.stat-card .num{font-family:var(--font-head);font-size:30px;font-weight:900;color:var(--text-0)}
.stat-card .lbl{font-size:11px;color:var(--text-2);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:0.04em}
.stat-card.accent{background:linear-gradient(135deg,rgba(10,186,181,0.08),rgba(196,163,90,0.06));border-color:var(--accent)}
.stat-card.accent .num{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* TTS removed */

/* Word/Grammar Item */
.item-card{
  background:var(--bg-2);border:2px solid var(--border-light);border-radius:var(--radius);
  padding:14px;box-shadow:var(--card-shadow);cursor:pointer;transition:all .2s;
}
.item-card:hover{box-shadow:var(--elevated-shadow);border-color:var(--accent);transform:translateY(-1px)}
.item-card+.item-card{margin-top:8px}
.item-card .word{font-family:var(--font-head);font-size:20px;font-weight:800}
.item-card .reading{font-family:var(--font-mono);font-size:13px;color:var(--accent);margin-top:2px}
.item-card .meaning{font-size:14px;color:var(--text-1);margin-top:4px}
.item-card .meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.item-card .example{
  font-size:13px;color:var(--text-2);margin-top:6px;padding:8px 10px;
  background:var(--bg-0);border-radius:var(--radius-sm);border-left:3px solid var(--accent);
}

/* FAB */
.fab{
  position:fixed;bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom,0));right:16px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;font-size:22px;cursor:pointer;
  box-shadow:0 4px 16px rgba(10,186,181,0.35);
  display:flex;align-items:center;justify-content:center;z-index:40;transition:all .2s;
}
.fab:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 6px 20px rgba(10,186,181,0.4)}
.fab:active{transform:scale(0.95)}

/* Modal */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,31,31,0.5);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeOverlay .2s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal-sheet{
  background:var(--bg-1);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;
  animation:slideUp .35s cubic-bezier(0.16,1,0.3,1);padding:20px;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

    <button class="nav-item" data-view="quiz"><i class="fas fa-brain"></i><span>Quiz</span><span class="badge" id="due-badge" style="display:none"></span></button>
  </div>
</div>
<div id="toast-container"></div>

<script>
/* ============================================================
   CONSTANTS
   ============================================================ */
const LANGS = {
  ja:{emoji:'🇯🇵',name:'日本語',label:'Japanese',fields:[
    {key:'reading',label:'Reading (読み)',placeholder:'ひらがな / カタカナ',type:'text'},
  ]},
  de:{emoji:'🇩🇪',name:'Deutsch',label:'German',fields:[
    {key:'article',label:'Article',placeholder:'',type:'select',options:['','der','die','das']},
    {key:'plural',label:'Plural',placeholder:'Plural form',type:'text'},
  ]},
  zh:{emoji:'🇨🇳',name:'中文',label:'Chinese',fields:[
    {key:'reading',label:'Pinyin',placeholder:'pīnyīn',type:'text'},
  ]},
  ko:{emoji:'🇰🇷',name:'한국어',label:'Korean',fields:[]},
  fr:{emoji:'🇫🇷',name:'Français',label:'French',fields:[]},
  es:{emoji:'🇪🇸',name:'Español',label:'Spanish',fields:[]},
  it:{emoji:'🇮🇹',name:'Italiano',label:'Italian',fields:[]},
  pt:{emoji:'🇵🇹',name:'Português',label:'Portuguese',fields:[]},
  ru:{emoji:'🇷🇺',name:'Русский',label:'Russian',fields:[]},
};

const QUIZ_TYPES = [
  {id:'mc-meaning',name:'Meaning',desc:'Pick the correct meaning',icon:'fa-circle-check'},
  {id:'mc-word',name:'Word',desc:'Pick the correct word',icon:'fa-pen-fancy'},
  {id:'type-answer',name:'Type It',desc:'Type the meaning',icon:'fa-keyboard'},
  {id:'flashcard',name:'Flashcard',desc:'Flip & rate yourself',icon:'fa-clone'},
  {id:'de-article',name:'der/die/das',desc:'German article quiz',icon:'fa-venus-mars',langOnly:'de'},
  {id:'ja-reading',name:'Reading',desc:'Type the reading',icon:'fa-spell-check',langOnly:'ja'},
];

/* ============================================================
   STORAGE (localStorage with fallback to in-memory)
   ============================================================ */
const _mem = {};
const _ls = (function(){ try { return window['local'+'Storage']; } catch(e) { return null; } })();
const storage = {
  _ok: null,
  available() {
    if (this._ok !== null) return this._ok;
    try { if(!_ls){this._ok=false;return false;} _ls.setItem('__t','1'); _ls.removeItem('__t'); this._ok = true; }
    catch(e) { this._ok = false; }
    return this._ok;
  },
  get(k) {
    try { return this.available() ? _ls.getItem(k) : (_mem[k] || null); }
    catch(e) { return _mem[k] || null; }
  },
  set(k, v) {
    try { if (this.available()) _ls.setItem(k, v); else _mem[k] = v; }
    catch(e) { _mem[k] = v; }
  },
  getJSON(k, def) {
    const v = this.get(k);
    if (!v) return def;
    try { return JSON.parse(v); } catch(e) { return def; }
  },
  setJSON(k, v) { this.set(k, JSON.stringify(v)); }
};

/* ============================================================
   STATE
   ============================================================ */
const state = {
  currentView: 'dashboard',
  vocabulary: [],
  grammar: [],
  config: {
    sheetsUrl: 'https://script.google.com/macros/s/AKfycbxQNbE_mCbJNWYL8nOMjxLes-6DSJcwJKCjOGatN2eyWEsl6eV0jvfmBgV8TUID5Pgjyw/exec',
    languages: ['ja','de'],
    categories: [], langCategories: {},
    aiEndpoint: '',
    aiKey: '',
    aiModel: ''
  },
  quiz: { active:false, type:null, lang:null, items:[], idx:0, results:[], flipped:false },
  filter: { lang:'', search:'', category:'all', openFolder:null },
};

const HARDCODED_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxQNbE_mCbJNWYL8nOMjxLes-6DSJcwJKCjOGatN2eyWEsl6eV0jvfmBgV8TUID5Pgjyw/exec';

function loadState() {
  state.config = storage.getJSON('lv_config', state.config);
  // Always enforce the hardcoded sheets URL
  state.config.sheetsUrl = HARDCODED_SHEETS_URL;
  state.vocabulary = storage.getJSON('lv_vocab', []);
  state.grammar = storage.getJSON('lv_grammar', []);
}
function saveVocab() { storage.setJSON('lv_vocab', state.vocabulary); }
function saveGrammar() { storage.setJSON('lv_grammar', state.grammar); }
function saveConfig() { storage.setJSON('lv_config', state.config); }

/* ============================================================
   GOOGLE SHEETS API
   ============================================================ */
const api = {
  async req(params) {
    if (!state.config.sheetsUrl) throw new Error('Google Sheets not configured');
    const url = state.config.sheetsUrl + '?' + new URLSearchParams(params);
    const r = await fetch(url, {redirect:'follow'});
    const text = await r.text();
    return JSON.parse(text);
  },
  async post(payload) {
    if (!state.config.sheetsUrl) throw new Error('Google Sheets not configured');
    const r = await fetch(state.config.sheetsUrl, {
      method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const text = await r.text();
    return JSON.parse(text);
  },
  read(tab) { return this.req({action:'read', tab}); },
  add(tab, data) {
    const encoded = encodeURIComponent(JSON.stringify(data));
    if (encoded.length < 1800) return this.req({action:'add', tab, data: JSON.stringify(data)});
    return this.post({action:'add', tab, data});
  },
  update(tab, id, data) {
    const encoded = encodeURIComponent(JSON.stringify(data));
    if (encoded.length < 1600) return this.req({action:'update', tab, id, data: JSON.stringify(data)});
    return this.post({action:'update', tab, id, data});
  },
  del(tab, id) { return this.req({action:'delete', tab, id}); },
  ping() { return this.req({action:'ping'}); },
  init() { return this.req({action:'init'}); },
  // Config sheet helpers for syncing settings (e.g. langCategories) across devices
  async loadRemoteConfig(key) {
    try {
      const res = await this.read('Config');
      const entry = (res.data || []).find(r => String(r.id) === key);
      if (entry && entry.value) return JSON.parse(entry.value);
    } catch(e) { /* Config sheet may not exist yet */ }
    return null;
  },
  async saveRemoteConfig(key, value) {
    const strVal = JSON.stringify(value);
    const res = await this.update('Config', key, {id: key, value: strVal});
    if (res.error === 'ID not found' || res.error === 'Sheet not found') {
      await this.add('Config', {id: key, value: strVal});
    }
  }
};

/* ============================================================
   SYNC MANAGER — Auto-sync with status indicator
   ============================================================ */
const syncManager = {
  pending: 0,
  failedOps: [],
  currentState: 'idle', // 'idle' | 'saving' | 'saved' | 'error' | 'pulling'
  savedTimer: null,

  async push(operation, description) {
    this.pending++;
    this.setState('saving');
    try {
      await operation();
      this.pending--;
      if (this.pending === 0 && this.failedOps.length === 0) {
        this.setState('saved');
      }
    } catch(e) {
      this.pending--;
      this.failedOps.push({ op: operation, desc: description || 'sync' });
      this.setState('error');
    }
  },

  async retry() {
    if (this.failedOps.length === 0) return;
    const ops = [...this.failedOps];
    this.failedOps = [];
    this.setState('saving');
    for (const entry of ops) {
      try {
        await entry.op();
      } catch(e) {
        this.failedOps.push(entry);
      }
    }
    if (this.failedOps.length > 0) {
      this.setState('error');
    } else if (this.pending === 0) {
      this.setState('saved');
    }
  },

  async pull() {
    this.setState('pulling');
    try {
      // Ensure sheets are initialized with proper headers first
      await api.init();
      const [vRes, gRes] = await Promise.all([api.read('Vocabulary'), api.read('Grammar')]);
      const remoteVocab = (vRes.data || []).map(normalizeVocab);
      const remoteGrammar = (gRes.data || []).map(normalizeGrammar);
      const localVocab = state.vocabulary.map(normalizeVocab);
      const localGrammar = state.grammar.map(normalizeGrammar);

      // ── Sync langCategories (folder config) — wrapped in try-catch so failures don't break main sync ──
      try {
        const remoteLangCats = await api.loadRemoteConfig('langCategories');
        const localLangCats = state.config.langCategories || {};
        const hasLocalCats = Object.keys(localLangCats).some(k => localLangCats[k] && localLangCats[k].length > 0);
        if (remoteLangCats) {
          state.config.langCategories = Object.assign({}, localLangCats, remoteLangCats);
          saveConfig();
        } else if (hasLocalCats) {
          try { await api.saveRemoteConfig('langCategories', localLangCats); } catch(e2) { /* Config sheet may not exist */ }
        }
      } catch(configErr) { /* Config sync failed — continue with vocab/grammar sync */ }

      if (remoteVocab.length === 0 && remoteGrammar.length === 0 && (localVocab.length > 0 || localGrammar.length > 0)) {
        // Sheets are empty but we have local data → push everything up
        this.setState('saving');
        const ops = [];
        localVocab.forEach(v => ops.push(() => api.add('Vocabulary', v)));
        localGrammar.forEach(g => ops.push(() => api.add('Grammar', g)));
        for (let i = 0; i < ops.length; i += 5) {
          await Promise.all(ops.slice(i, i + 5).map(fn => fn()));
        }
        this.setState('saved');
      } else if (remoteVocab.length > 0 || remoteGrammar.length > 0) {
        // Sheets have data → smart merge with local data
        const localVById = {};
        localVocab.forEach(v => { if(v.id) localVById[v.id] = v; });
        const localGById = {};
        localGrammar.forEach(g => { if(g.id) localGById[g.id] = g; });

        // For items in both: preserve local category/fields if remote is empty
        const fixOps = [];
        remoteVocab.forEach(v => {
          const local = localVById[v.id];
          if (local) {
            let changed = false;
            if (!v.category && local.category) { v.category = local.category; changed = true; }
            if (!v.meaning && local.meaning) { v.meaning = local.meaning; changed = true; }
            if (!v.reading && local.reading) { v.reading = local.reading; changed = true; }
            if (changed) fixOps.push(() => api.update('Vocabulary', v.id, v));
          }
        });
        remoteGrammar.forEach(g => {
          const local = localGById[g.id];
          if (local) {
            let changed = false;
            if (!g.category && local.category) { g.category = local.category; changed = true; }
            if (!g.explanation && local.explanation) { g.explanation = local.explanation; changed = true; }
            if (changed) fixOps.push(() => api.update('Grammar', g.id, g));
          }
        });

        const remoteVIds = new Set(remoteVocab.map(v => v.id));
        const remoteGIds = new Set(remoteGrammar.map(g => g.id));
        const localOnlyV = localVocab.filter(v => v.id && !remoteVIds.has(v.id));
        const localOnlyG = localGrammar.filter(g => g.id && !remoteGIds.has(g.id));

        // Push local-only items + field fixes to sheets
        const allOps = [];
        localOnlyV.forEach(v => allOps.push(() => api.add('Vocabulary', v)));
        localOnlyG.forEach(g => allOps.push(() => api.add('Grammar', g)));
        allOps.push(...fixOps);
        for (let i = 0; i < allOps.length; i += 5) {
          await Promise.all(allOps.slice(i, i + 5).map(fn => fn()));
        }

        // Final merged state
        state.vocabulary = [...remoteVocab, ...localOnlyV];
        state.grammar = [...remoteGrammar, ...localOnlyG];
        saveVocab();
        saveGrammar();
        this.setState('saved');
      } else {
        this.setState('saved');
      }
      renderCurrentView();
    } catch(e) {
      console.log('Pull error: ' + (e.message || e));
      this.failedOps.push({ op: () => this.pull(), desc: 'pull' });
      this.setState('error');
    }
  },

  // Force push ALL local data to Sheets (overwrites remote with local)
  async pushAll() {
    this.setState('saving');
    try {
      await api.init();
      // Delete all remote data and re-push everything
      const [vRes, gRes] = await Promise.all([api.read('Vocabulary'), api.read('Grammar')]);
      const remoteVocab = vRes.data || [];
      const remoteGrammar = gRes.data || [];

      // Delete all remote items
      const delOps = [];
      remoteVocab.forEach(v => { if(v.id) delOps.push(() => api.del('Vocabulary', v.id)); });
      remoteGrammar.forEach(g => { if(g.id) delOps.push(() => api.del('Grammar', g.id)); });
      for (let i = 0; i < delOps.length; i += 5) {
        await Promise.all(delOps.slice(i, i + 5).map(fn => fn()));
      }

      // Re-add all local items (with current categories)
      const addOps = [];
      state.vocabulary.forEach(v => addOps.push(() => api.add('Vocabulary', normalizeVocab(v))));
      state.grammar.forEach(g => addOps.push(() => api.add('Grammar', normalizeGrammar(g))));
      for (let i = 0; i < addOps.length; i += 5) {
        await Promise.all(addOps.slice(i, i + 5).map(fn => fn()));
      }

      // Also push langCategories
      try { await api.saveRemoteConfig('langCategories', state.config.langCategories || {}); } catch(e) { /* ok */ }

      this.setState('saved');
      showToast('All data pushed to Google Sheets!', 'success');
    } catch(e) {
      console.log('Push all error: ' + (e.message || e));
      this.setState('error');
      showToast('Push failed: ' + (e.message || 'Unknown error'), 'error');
    }
  },

  setState(s) {
    this.currentState = s;
    if (this.savedTimer) { clearTimeout(this.savedTimer); this.savedTimer = null; }
    updateSyncIndicator();
    // Auto-hide "saved" after 4 seconds
    if (s === 'saved') {
      this.savedTimer = setTimeout(() => {
        if (this.currentState === 'saved') {
          this.currentState = 'idle';
          updateSyncIndicator();
        }
      }, 4000);
    }
  }
};

// Safe string: guards against null, undefined, and the literal string "undefined"
function safeStr(v) { return (v == null || v === 'undefined' || v === 'null') ? '' : String(v); }

function normalizeVocab(v) {
  return {
    id: safeStr(v.id), lang: safeStr(v.lang), word: safeStr(v.word),
    reading: safeStr(v.reading), article: safeStr(v.article),
    plural: safeStr(v.plural), meaning: safeStr(v.meaning),
    example: safeStr(v.example), tags: safeStr(v.tags),
    category: safeStr(v.category),
    difficulty: Number(v.difficulty) || 0,
    nextReview: safeStr(v.nextReview), interval: Number(v.interval) || 0,
    easeFactor: Number(v.easeFactor) || 2.5, repetitions: Number(v.repetitions) || 0,
    createdAt: safeStr(v.createdAt)
  };
}
function normalizeGrammar(g) {
  return {
    id: safeStr(g.id), lang: safeStr(g.lang), pattern: safeStr(g.pattern),
    explanation: safeStr(g.explanation), examples: safeStr(g.examples),
    tags: safeStr(g.tags), category: safeStr(g.category),
    difficulty: Number(g.difficulty) || 0,
    nextReview: safeStr(g.nextReview), interval: Number(g.interval) || 0,
    easeFactor: Number(g.easeFactor) || 2.5, repetitions: Number(g.repetitions) || 0,
    createdAt: safeStr(g.createdAt)
  };
}
function getUsedCategories(lang) {
  // Build ordered list: langCategories order first, then any extras from data
  const ordered = [];
  const seen = new Set();
  // 1. Respect user-defined order from langCategories
  if (lang && state.config.langCategories && state.config.langCategories[lang]) {
    state.config.langCategories[lang].forEach(c => {
      if (!seen.has(c)) { ordered.push(c); seen.add(c); }
    });
  }
  // 2. Legacy shared categories
  (state.config.categories||[]).forEach(c => {
    if (!seen.has(c)) { ordered.push(c); seen.add(c); }
  });
  // 3. Any categories found in data but not in the arrays
  const vPool = lang ? state.vocabulary.filter(v => v.lang === lang) : state.vocabulary;
  const gPool = lang ? state.grammar.filter(g => g.lang === lang) : state.grammar;
  vPool.forEach(v => { if(v.category && !seen.has(v.category)) { ordered.push(v.category); seen.add(v.category); } });
  gPool.forEach(g => { if(g.category && !seen.has(g.category)) { ordered.push(g.category); seen.add(g.category); } });
  return ordered;
}

function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const s = syncManager.currentState;
  el.className = 'sync-indicator ' + s;
  switch(s) {

      break;
    case 'pulling':
      el.innerHTML = '<i class="fas fa-arrows-rotate"></i><span>Syncing...</span>';
      break;

      el.innerHTML = '';

  }
}

/* ============================================================
   SM-2 SPACED REPETITION
   ============================================================ */
function sm2(quality, item) {
  let reps = Number(item.repetitions) || 0;
  let ivl = Number(item.interval) || 0;
  let ef = Number(item.easeFactor) || 2.5;
  if (quality >= 3) {
    if (reps === 0) ivl = 1;
    else if (reps === 1) ivl = 6;
    else ivl = Math.round(ivl * ef);
    reps++;
  } else {
    reps = 0; ivl = 1;
  }
  ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ef < 1.3) ef = 1.3;
  const next = new Date();
  next.setDate(next.getDate() + ivl);
  return { repetitions:reps, interval:ivl, easeFactor:Math.round(ef*100)/100, nextReview:next.toISOString().split('T')[0] };
}

function getDueCount() {
  const today = new Date().toISOString().split('T')[0];
  const lang = state.filter.lang;
  let vocab = state.vocabulary;
  let gram = state.grammar;
  if (lang) { vocab = vocab.filter(v => v.lang === lang); gram = gram.filter(g => g.lang === lang); }
  const vDue = vocab.filter(v => !v.nextReview || v.nextReview <= today).length;
  const gDue = gram.filter(g => !g.nextReview || g.nextReview <= today).length;
  return vDue + gDue;
}

/* ============================================================
   DASHBOARD QUICK SEARCH
   ============================================================ */
function initDashSearch() {
  const inp = document.getElementById('dash-search-input');
  const suggest = document.getElementById('dash-suggest');
  if (!inp || !suggest) return;

  let activeIdx = -1;
  let results = [];

  const doSearch = debounce(function(q) {
    q = q.trim().toLowerCase();
    if (!q) { suggest.classList.remove('open'); suggest.innerHTML = ''; results = []; activeIdx = -1; return; }
    const lang = state.filter.lang;
    const vocabHits = state.vocabulary
      .filter(v => v.lang === lang && (
        v.word.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q) ||
        (v.reading||'').toLowerCase().includes(q)
      ))
      .map(v => ({ type:'vocab', id:v.id, primary:v.word, secondary:v.meaning, reading:v.reading||'', data:v }));
    const gramHits = state.grammar
      .filter(g => g.lang === lang && (
        g.pattern.toLowerCase().includes(q) || g.explanation.toLowerCase().includes(q)
      ))
      .map(g => ({ type:'grammar', id:g.id, primary:g.pattern, secondary:g.explanation.substring(0,60), reading:'', data:g }));
    results = [...vocabHits, ...gramHits].slice(0, 8);
    activeIdx = -1;
    if (results.length === 0) {
      suggest.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text-2);font-weight:600;text-align:center">No results found</div>';
      suggest.classList.add('open');
      return;
    }
    suggest.innerHTML = results.map((r, i) => `
      <div class="dash-suggest-item" data-idx="${i}" onmousedown="selectDashResult(${i})">
        <div class="ds-type ${r.type}"><i class="fas ${r.type==='vocab'?'fa-language':'fa-book-open'}"></i></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="ds-text">${esc(r.primary)}</span>
            ${r.reading ? `<span class="ds-reading">${esc(r.reading)}</span>` : ''}
          </div>
          <div class="ds-sub">${esc(r.secondary)}</div>
        </div>
      </div>
    `).join('');
    suggest.classList.add('open');
  }, 150);

  inp.addEventListener('input', function() { doSearch(this.value); });

  inp.addEventListener('keydown', function(e) {
    if (!results.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, results.length-1); highlightSuggest(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); highlightSuggest(); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); selectDashResult(activeIdx); }
    else if (e.key === 'Escape') { suggest.classList.remove('open'); inp.blur(); }
  });

  inp.addEventListener('blur', function() { setTimeout(()=>suggest.classList.remove('open'), 200); });
  inp.addEventListener('focus', function() { if (results.length > 0 && this.value.trim()) suggest.classList.add('open'); });

  function highlightSuggest() {
    suggest.querySelectorAll('.dash-suggest-item').forEach((el, i) => {
      el.classList.toggle('active', i === activeIdx);
    });
  }
}

function selectDashResult(idx) {
  const inp = document.getElementById('dash-search-input');
  const suggest = document.getElementById('dash-suggest');
  if (suggest) suggest.classList.remove('open');

  // Re-run the search to get the results array
  const q = inp ? inp.value.trim().toLowerCase() : '';
  const lang = state.filter.lang;
  const vocabHits = state.vocabulary
    .filter(v => v.lang === lang && (v.word.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q) || (v.reading||'').toLowerCase().includes(q)))
    .map(v => ({ type:'vocab', id:v.id, data:v }));
  const gramHits = state.grammar
    .filter(g => g.lang === lang && (g.pattern.toLowerCase().includes(q) || g.explanation.toLowerCase().includes(q)))
    .map(g => ({ type:'grammar', id:g.id, data:g }));
  const results = [...vocabHits, ...gramHits].slice(0, 8);
  if (idx < 0 || idx >= results.length) return;

  const r = results[idx];

function getFilteredVocab() {
  let arr = [...state.vocabulary];
  if(state.filter.lang!=='all') arr = arr.filter(v=>v.lang===state.filter.lang);
  if(state.filter.openFolder !== null) {
    if(state.filter.openFolder==='__uncat') arr = arr.filter(v=>!v.category);
    else arr = arr.filter(v=>v.category===state.filter.openFolder);
  }
  if(state.filter.search) {
    const q = state.filter.search.toLowerCase();
    arr = arr.filter(v=>
      v.word.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q) ||
      v.reading.toLowerCase().includes(q) || v.tags.toLowerCase().includes(q) ||
      (v.category||'').toLowerCase().includes(q)
    );
  }
  return arr.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
}

/* ============================================================

function moveFolder(name, direction, view) {
  const lang = state.filter.lang;
  if (!state.config.langCategories) state.config.langCategories = {};
  if (!state.config.langCategories[lang]) state.config.langCategories[lang] = [];

  // Ensure all used categories are in the langCategories array (preserves order)
  const cats = getUsedCategories(lang);
  const arr = state.config.langCategories[lang];
  cats.forEach(c => { if (!arr.includes(c)) arr.push(c); });

  const idx = arr.indexOf(name);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= arr.length) return;
  // Swap
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  saveConfig();
  syncManager.push(() => api.saveRemoteConfig('langCategories', state.config.langCategories), 'sync folders');
  if (view === 'words') renderWords();
  else renderGrammar();
}

function showFolderOptionsPrompt(name, view) {
  const el = document.createElement('div');

  });

    if (e.key === 'Enter') { e.preventDefault(); el.querySelector('#folder-rename-ok').click(); }

  el.addEventListener('click', (e) => { if (e.target === el) el.remove(); });

function renameFolder(oldName, newName, view) {
  const lang = state.filter.lang;

  // Update langCategories array
  if (state.config.langCategories && state.config.langCategories[lang]) {
    const arr = state.config.langCategories[lang];
    const idx = arr.indexOf(oldName);
    if (idx >= 0) arr[idx] = newName;
  }
  // Update legacy categories
  if (state.config.categories) {
    const idx = state.config.categories.indexOf(oldName);
    if (idx >= 0) state.config.categories[idx] = newName;
  }
  saveConfig();
  syncManager.push(() => api.saveRemoteConfig('langCategories', state.config.langCategories), 'sync folders');

  // Update all vocabulary items with this folder
  let vocabChanged = false;
  state.vocabulary.forEach(v => {
    if (v.category === oldName && v.lang === lang) {
      v.category = newName;
      vocabChanged = true;
      syncManager.push(() => api.update('Vocabulary', v.id, v), 'rename folder vocab');
    }
  });
  if (vocabChanged) saveVocab();

  // Update all grammar items with this folder
  let gramChanged = false;
  state.grammar.forEach(g => {
    if (g.category === oldName && g.lang === lang) {
      g.category = newName;
      gramChanged = true;
      syncManager.push(() => api.update('Grammar', g.id, g), 'rename folder grammar');
    }
  });
  if (gramChanged) saveGrammar();

  // If currently inside the renamed folder, update the open folder reference
  if (state.filter.openFolder === oldName) state.filter.openFolder = newName;

  showToast('Folder renamed to "' + newName + '"', 'success');
  renderCurrentView();
}

function deleteFolder(name, view) {
  const lang = state.filter.lang;

  // Remove from langCategories
  if (state.config.langCategories && state.config.langCategories[lang]) {
    state.config.langCategories[lang] = state.config.langCategories[lang].filter(c => c !== name);
  }
  // Remove from legacy categories
  if (state.config.categories) {
    state.config.categories = state.config.categories.filter(c => c !== name);
  }
  saveConfig();
  syncManager.push(() => api.saveRemoteConfig('langCategories', state.config.langCategories), 'sync folders');

  // Clear category on all items in this folder (make them Unfiled)
  let vocabChanged = false;
  state.vocabulary.forEach(v => {
    if (v.category === name && v.lang === lang) {
      v.category = '';
      vocabChanged = true;
      syncManager.push(() => api.update('Vocabulary', v.id, v), 'delete folder vocab');
    }
  });
  if (vocabChanged) saveVocab();

  let gramChanged = false;
  state.grammar.forEach(g => {
    if (g.category === name && g.lang === lang) {
      g.category = '';
      gramChanged = true;
      syncManager.push(() => api.update('Grammar', g.id, g), 'delete folder grammar');
    }
  });
  if (gramChanged) saveGrammar();

  if (state.filter.openFolder === name) state.filter.openFolder = null;

  showToast('Folder "' + name + '" deleted', 'info');
  renderCurrentView();
}

function renderLangFields(lang, prefix) {
  const def = LANGS[lang];
  if(!def || !def.fields || def.fields.length===0) return '';
  return def.fields.map(f=>{
    if(f.type==='select'){
      return `<div class="form-group"><label>${f.label}</label><select id="${prefix}-${f.key}">${f.options.map(o=>`<option value="${o}">${o||'—'}</option>`).join('')}</select></div>`;
    }
    return `<div class="form-group"><label>${f.label}</label><input id="${prefix}-${f.key}" placeholder="${f.placeholder||''}" type="text"></div>`;
  }).join('');
}

function updateWordFields(lang) {

    example: document.getElementById('aw-example').value.trim(),
    tags: '',
    category: document.getElementById('aw-category').value.trim(),
    difficulty:0, nextReview:'', interval:0, easeFactor:2.5, repetitions:0,

  showToast('Word added!','success');

function handleBatchAdd() {
  const lang = state.filter.lang;
  const category = document.getElementById('ba-category').value.trim();
  const raw = document.getElementById('ba-lines').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length === 0) { showToast('Enter at least one word', 'error'); return; }

  let added = 0;
  const langDef = LANGS[lang];
  const hasReading = langDef && langDef.fields && langDef.fields.some(f => f.key === 'reading');

  // Helpers to detect CJK / kana characters
  const hasCJK = s => /[\u4E00-\u9FFF\u3400-\u4DBF]/.test(s);
  const hasKana = s => /[\u3040-\u309F\u30A0-\u30FF]/.test(s);
  const isJPToken = s => hasCJK(s) || hasKana(s);

  lines.forEach(line => {
    // Split by whitespace
    const tokens = line.split(/\s+/);
    if (tokens.length < 2) return; // need at least word + meaning
    let word, reading = '', meaning;

    if (hasReading && tokens.length >= 3 && isJPToken(tokens[0]) && isJPToken(tokens[1])) {
      // Format: 漢字 読み meaning (first two tokens are JP, rest is meaning)
      word = tokens[0];
      reading = tokens[1];
      meaning = tokens.slice(2).join(' ');
    } else {
      // Format: word meaning (first token is word, rest is meaning)
      word = tokens[0];
      meaning = tokens.slice(1).join(' ');
    }
    if (!word || !meaning) return;
    const data = {
      id: uid(), lang, word, reading, article: '', plural: '',
      meaning, example: '', tags: '', category: category === '__new' ? '' : category,
      difficulty: 0, nextReview: '', interval: 0, easeFactor: 2.5, repetitions: 0,
      createdAt: new Date().toISOString()
    };
    state.vocabulary.push(data);
    const batchData = {...data};
    syncManager.push(() => api.add('Vocabulary', batchData), 'batch add');
    added++;
  });

  saveVocab();
  closeModal();
  showToast(added + ' word' + (added !== 1 ? 's' : '') + ' added!', 'success');
  renderCurrentView();
}

function startQuiz(type, lang, count, dueOnly) {
  let pool = [...state.vocabulary];
  if(lang!=='all') pool = pool.filter(v=>v.lang===lang);

  if(type==='de-article') pool = pool.filter(v=>v.lang==='de' && v.article);
  if(type==='ja-reading') pool = pool.filter(v=>v.lang==='ja' && v.reading);

  if(pool.length < (type==='flashcard'||type==='type-answer'||type==='ja-reading'?1:4)){
    showToast('Not enough items for this quiz type','error');
    return;
  }

  const today = todayStr();
  let selected;
  if(dueOnly) {
    const due = pool.filter(v=>!v.nextReview||v.nextReview<=today);
    selected = shuffle(due).slice(0, count);
    if(selected.length===0){ showToast('Nothing due for review!','info'); return; }
  } else {
    const due = pool.filter(v=>!v.nextReview||v.nextReview<=today);
    const notDue = pool.filter(v=>v.nextReview&&v.nextReview>today);
    const dueCount = Math.min(Math.ceil(count*0.7), due.length);
    selected = shuffle(due).slice(0,dueCount);
    const remaining = count - selected.length;
    selected.push(...shuffle(notDue).slice(0, remaining));
    if(selected.length < count) {
      const rest = pool.filter(p=>!selected.some(s=>s.id===p.id));
      selected.push(...shuffle(rest).slice(0, count-selected.length));
    }
    selected = shuffle(selected);
  }

  const items = selected.map(item => createQuestion(type, item, pool));

  state.quiz = { active:true, type, lang, items, idx:0, results:[], flipped:false };
  renderCurrentView();
}

function createQuestion(type, item, pool) {
  switch(type) {
    case 'mc-meaning': {
      const others = pool.filter(v=>v.id!==item.id);
      const distractors = shuffle(others).slice(0,3).map(v=>v.meaning);
      const opts = shuffle([item.meaning, ...distractors]);
      return {type:'mc', item, question:item.word, questionSub:item.reading||'', prompt:'What does this mean?', options:opts, answer:item.meaning};
    }
    case 'mc-word': {
      const others = pool.filter(v=>v.id!==item.id);
      const distractors = shuffle(others).slice(0,3).map(v=>v.word);
      const opts = shuffle([item.word, ...distractors]);
      return {type:'mc', item, question:item.meaning, questionSub:'', prompt:'Which word?', options:opts, answer:item.word};
    }
    case 'type-answer': {
      return {type:'type', item, question:item.word, questionSub:item.reading||'', prompt:'Type the meaning', answer:item.meaning};
    }
    case 'de-article': {
      return {type:'mc', item, question:item.word, questionSub:item.meaning, prompt:'Which article?', options:['der','die','das'], answer:item.article};
    }
    case 'ja-reading': {
      return {type:'type', item, question:item.word, questionSub:item.meaning, prompt:'Type the reading', answer:item.reading};
    }
    case 'flashcard': default: {
      return {type:'flashcard', item, front:item.word, frontSub:item.reading||'', back:item.meaning, backSub:item.example||''};
    }
  }
}

function answerMC(idx) {
  const q = state.quiz;
  const current = q.items[q.idx];
  const chosen = current.options[idx];
  const correct = chosen === current.answer;

  // Highlight answers
  const opts = document.querySelectorAll('#quiz-opts .quiz-opt');
  opts.forEach((o,i)=>{
    o.disabled = true;
    o.onclick = null;
    if(current.options[i]===current.answer) o.classList.add('correct');
    if(i===idx && !correct) o.classList.add('wrong');
  });

  q.results.push({item:current.item, correct, chosen, answer:current.answer});

  // Update SRS
  const quality = correct ? 4 : 1;
  updateSRS(current.item, quality);

  setTimeout(()=>{ q.idx++; renderQuizActive(document.getElementById('view-quiz')); }, correct?600:1200);
}

function answerType(e) {
  e.preventDefault();
  const q = state.quiz;
  const current = q.items[q.idx];
  const input = document.getElementById('type-input').value.trim();
  const correct = input.toLowerCase() === current.answer.toLowerCase();

  const fb = document.getElementById('type-feedback');
  fb.style.display = 'block';
  if(correct) {
    fb.innerHTML = `<div class="card" style="background:var(--success-bg);border:1px solid var(--success);color:var(--success);text-align:center;padding:12px"><i class="fas fa-check-circle"></i> Correct!</div>`;
  } else {
    fb.innerHTML = `<div class="card" style="background:var(--error-bg);border:1px solid var(--error);color:var(--error);padding:12px"><i class="fas fa-times-circle"></i> Incorrect<br><span style="font-size:14px">Correct answer: <b>${esc(current.answer)}</b></span></div>`;
  }
  document.getElementById('type-input').disabled = true;

  q.results.push({item:current.item, correct, chosen:input, answer:current.answer});
  updateSRS(current.item, correct?4:1);
  setTimeout(()=>{ q.idx++; renderQuizActive(document.getElementById('view-quiz')); }, correct?800:1500);
}

function rateFlashcard(quality) {
  const q = state.quiz;
  const current = q.items[q.idx];
  q.results.push({item:current.item, correct:quality>=3, quality});
  updateSRS(current.item, quality);
  q.idx++;
  q.flipped = false;
  renderQuizActive(document.getElementById('view-quiz'));
}

function updateSRS(item, quality) {
  const result = sm2(quality, item);
  // Update in vocabulary
  const vIdx = state.vocabulary.findIndex(v=>v.id===item.id);
  if(vIdx>=0) {
    Object.assign(state.vocabulary[vIdx], result);
    saveVocab();
    const updatedItem = {...state.vocabulary[vIdx]};
    syncManager.push(() => api.update('Vocabulary', item.id, updatedItem), 'update SRS');
  }
}

function quitQuiz() {
  state.quiz = {active:false,type:state.quiz.type,lang:state.quiz.lang,items:[],idx:0,results:[],flipped:false};
  renderQuiz();
}

function renderQuizResults(el) {
  const q = state.quiz;
  const correct = q.results.filter(r=>r.correct).length;
  const total = q.results.length;
  const pct = total>0?Math.round(correct/total*100):0;
  const circumference = 2 * Math.PI * 58;
  const offset = circumference - (pct/100) * circumference;

  const encouragements = pct===100?'Perfect! 🎉':pct>=80?'Great job! 💪':pct>=60?'Keep going! 📚':pct>=40?'Not bad, review more! 🔄':'Time to study! 📖';
  const mistakes = q.results.filter(r=>!r.correct);

  el.innerHTML = `
    <div class="quiz-results">
      <div class="score-ring">
        <svg width="146" height="146"><circle cx="73" cy="73" r="58" fill="none" stroke="var(--border)" stroke-width="6"/>
        <circle cx="73" cy="73" r="58" fill="none" stroke="var(--accent)" stroke-width="6"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transition:stroke-dashoffset 1s ease"/></svg>
        <div class="score-pct">${pct}%</div>
        <div class="score-label">${correct}/${total}</div>
      </div>
      <div class="encouragement">${encouragements}</div>
      ${mistakes.length>0?`
        <div class="mistakes"><h3 style="font-size:16px;margin-bottom:8px">Review Mistakes</h3>
          ${mistakes.map(m=>`<div class="mistake-item">
            <div><b>${esc(m.item.word)}</b></div>
            <div style="flex:1"><span style="text-decoration:line-through;opacity:0.6">${esc(m.chosen||'')}</span> → <b>${esc(m.answer||m.item.meaning)}</b></div>
          </div>`).join('')}
        </div>
      `:''}
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-secondary" style="flex:1" onclick="quitQuiz()"><i class="fas fa-arrow-left"></i> Back</button>
        <button class="btn btn-primary" style="flex:1" onclick="handleStartQuiz2()"><i class="fas fa-redo"></i> Again</button>
      </div>
    </div>
  `;
}

function handleStartQuiz2() {
  startQuiz(state.quiz.type, state.quiz.lang, state.quiz.results.length, false);
}

function saveAIConfig() {
  state.config.aiEndpoint = document.getElementById('set-ai-endpoint').value.trim();
  state.config.aiKey = document.getElementById('set-ai-key').value.trim();
  state.config.aiModel = document.getElementById('set-ai-model').value.trim();
  saveConfig();
  showToast('AI config saved','success');
}

function showAddLanguagePrompt() {
  const available = Object.keys(LANGS).filter(l=>!(state.config.languages||[]).includes(l));
  if(available.length===0){ showToast('All languages already added','info'); return; }
  showModal(`
    <h2>Add Language</h2>
    <div class="form-group"><label>Select Language</label>
      <select id="new-lang-select">
        ${available.map(l=>`<option value="${l}">${langLabel(l)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addLanguage()">Add</button>
    </div>
  `);
}

function addLanguage() {
  const lang = document.getElementById('new-lang-select').value;
  if(!state.config.languages) state.config.languages = [];
  if(!state.config.languages.includes(lang)) state.config.languages.push(lang);
  saveConfig();
  closeModal();
  showToast(langLabel(lang)+' added','success');
  renderCurrentView();
}

function removeLang(lang) {
  state.config.languages = (state.config.languages||[]).filter(l=>l!==lang);
  if(state.filter.lang===lang) state.filter.lang = 'all';
  saveConfig();
  renderLangBar();
  renderSettings();
}

function exportData() {
  const data = { vocabulary:state.vocabulary, grammar:state.grammar, config:state.config, exportedAt:new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'lexivault-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Data exported','success');
}

function showImportPrompt() {
  showModal(`
    <h2>Import Data</h2>
    <p style="font-size:14px;color:var(--text-1);margin-bottom:12px">Select a LexiVault JSON backup file to import.</p>
    <div class="form-group">
      <input type="file" id="import-file" accept=".json" style="font-size:16px">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doImport()">Import</button>
    </div>
  `);
}

function doImport() {
  const f = document.getElementById('import-file').files[0];
  if(!f){ showToast('Select a file first','error'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(data.vocabulary) { state.vocabulary = data.vocabulary.map(normalizeVocab); saveVocab(); }
      if(data.grammar) { state.grammar = data.grammar.map(normalizeGrammar); saveGrammar(); }
      if(data.config) {
        if(data.config.languages) state.config.languages = data.config.languages;
        saveConfig();
      }
      closeModal();
      showToast('Data imported! ('+state.vocabulary.length+' words, '+state.grammar.length+' grammar)','success');
      renderCurrentView();
    } catch(err) { showToast('Invalid file: '+err.message,'error'); }
  };
  reader.readAsText(f);
}

function clearAllData() {
  showConfirm('Clear ALL local data? This cannot be undone.', ()=>{
    state.vocabulary = []; state.grammar = [];
    saveVocab(); saveGrammar();
    showToast('All data cleared','info');
    renderCurrentView();
  });
}

function copyScript() {
  const code = APPS_SCRIPT_CODE;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(code).then(()=>showToast('Script copied!','success')).catch(()=>showToast('Copy failed','error'));
  } else {
    showToast('Clipboard not available','error');
  }
}

/* ============================================================
   APPS SCRIPT CODE
   ============================================================ */
const APPS_SCRIPT_CODE = `const VOCAB_HEADERS = ['id','lang','word','reading','article','plural','meaning','example','tags','category','difficulty','nextReview','interval','easeFactor','repetitions','createdAt'];
const GRAMMAR_HEADERS = ['id','lang','pattern','explanation','examples','tags','category','difficulty','nextReview','interval','easeFactor','repetitions','createdAt'];

function doGet(e) {
  try {
    const action = e.parameter.action;
    const tab = e.parameter.tab;
    switch(action) {
      case 'read': return respond(readTab(tab));
      case 'add': return respond(addRow(tab, JSON.parse(e.parameter.data)));
      case 'update': return respond(updateRow(tab, e.parameter.id, JSON.parse(e.parameter.data)));
      case 'delete': return respond(deleteRow(tab, e.parameter.id));
      case 'init': return respond(initSheets());
      case 'ping': return respond({ ok: true });
      default: return respond({ error: 'Unknown action' });
    }
  } catch(err) { return respond({ error: err.message }); }
}

function doPost(e) {
  try {
    const p = JSON.parse(e.postData.contents);
    switch(p.action) {
      case 'add': return respond(addRow(p.tab, p.data));
      case 'update': return respond(updateRow(p.tab, p.id, p.data));
      case 'delete': return respond(deleteRow(p.tab, p.id));
      case 'init': return respond(initSheets());
      default: return respond({ error: 'Unknown action' });
    }
  } catch(err) { return respond({ error: err.message }); }
}

function respond(data) {
  return ContentService.createTextOutput(JSON.stringify(data)).setMimeType(ContentService.MimeType.JSON);
}

function initSheets() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  if (!ss.getSheetByName('Vocabulary')) {
    const s = ss.insertSheet('Vocabulary');
    s.appendRow(VOCAB_HEADERS);
  }
  if (!ss.getSheetByName('Grammar')) {
    const s = ss.insertSheet('Grammar');
    s.appendRow(GRAMMAR_HEADERS);
  }
  return { ok: true };
}

function readTab(tab) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(tab);
  if (!sheet) return { data: [] };
  const data = sheet.getDataRange().getValues();
  if (data.length <= 1) return { data: [] };
  const headers = data[0];
  return { data: data.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i]; });
    return obj;
  })};
}

function addRow(tab, data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(tab);
  if (!sheet) { initSheets(); sheet = ss.getSheetByName(tab); }
  const headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];
  sheet.appendRow(headers.map(h => data[h] !== undefined ? data[h] : ''));
  return { ok: true };
}

function updateRow(tab, id, data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(tab);
  if (!sheet) return { error: 'Sheet not found' };
  const all = sheet.getDataRange().getValues();
  const headers = all[0];
  const idIdx = headers.indexOf('id');
  for (let i = 1; i < all.length; i++) {
    if (String(all[i][idIdx]) === String(id)) {
      const row = headers.map((h, j) => data[h] !== undefined ? data[h] : all[i][j]);
      sheet.getRange(i + 1, 1, 1, headers.length).setValues([row]);
      return { ok: true };
    }
  }
  return { error: 'ID not found' };
}

function deleteRow(tab, id) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(tab);
  if (!sheet) return { error: 'Sheet not found' };
  const all = sheet.getDataRange().getValues();
  const headers = all[0];
  const idIdx = headers.indexOf('id');
  for (let i = 1; i < all.length; i++) {
    if (String(all[i][idIdx]) === String(id)) {
      sheet.deleteRow(i + 1);
      return { ok: true };
    }
  }
  return { error: 'ID not found' };
}`;

function init() {
  loadState();
  // Cleanup: fix any "undefined" strings in category fields from prior bugs
  let cleaned = false;
  state.vocabulary.forEach(v => {
    if (v.category === 'undefined' || v.category === 'null') { v.category = ''; cleaned = true; }
  });
  state.grammar.forEach(g => {
    if (g.category === 'undefined' || g.category === 'null') { g.category = ''; cleaned = true; }
  });
  if (cleaned) { saveVocab(); saveGrammar(); }
  renderCurrentView();
  // Auto-pull from Google Sheets on load
  setTimeout(() => syncManager.pull(), 800);
}

init();
